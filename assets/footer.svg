<svg width="900" height="120" viewBox="0 0 900 120" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, sans-serif">
  <defs>
    <linearGradient id="ftbg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a0c10"/>
      <stop offset="1" stop-color="#10131a"/>
    </linearGradient>
    <linearGradient id="ftacc" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#8b5cf6"/>
      <stop offset="0.5" stop-color="#6366f1"/>
      <stop offset="1" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="fttitle" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#a78bfa"/>
      <stop offset="0.5" stop-color="#60a5fa"/>
      <stop offset="1" stop-color="#34d399"/>
    </linearGradient>
    <radialGradient id="ftglow" cx="0.5" cy="0.5" r="0.6">
      <stop offset="0" stop-color="#6366f1" stop-opacity="0.15"/>
      <stop offset="1" stop-color="#6366f1" stop-opacity="0"/>
    </radialGradient>
    <pattern id="ftgrid" width="28" height="28" patternUnits="userSpaceOnUse">
      <path d="M28 0 L0 0 0 28" fill="none" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="900" height="120" rx="16" fill="url(#ftbg)"/>
  <rect width="900" height="120" rx="16" fill="url(#ftgrid)"/>
  <rect width="900" height="120" rx="16" fill="url(#ftglow)"/>
  <rect x="0.5" y="0.5" width="899" height="119" rx="16" fill="none" stroke="#ffffff" stroke-opacity="0.08"/>
  <rect x="0" y="0" width="900" height="3" rx="1.5" fill="url(#ftacc)"/>

  <!-- Main message -->
  <text x="450" y="50" text-anchor="middle" fill="url(#fttitle)" font-size="22" font-weight="700" letter-spacing="-0.3">Let's build something intelligent together.</text>

  <!-- Star line with icon -->
  <g transform="translate(330, 76)">
    <path d="M14 0 l3.2 7 l7.6 0.8 l-5.6 5.3 l1.4 7.6 l-6.6 -3.6 l-6.6 3.6 l1.4 -7.6 l-5.6 -5.3 l7.6 -0.8 z" fill="#fbbf24"/>
  </g>
  <text x="365" y="93" fill="#8b93a7" font-size="14">Star a repo if it helped you.</text>

  <!-- Subtle bottom accent dots -->
  <circle cx="430" cy="108" r="2" fill="#8b5cf6" fill-opacity="0.5"/>
  <circle cx="450" cy="108" r="2" fill="#6366f1" fill-opacity="0.6"/>
  <circle cx="470" cy="108" r="2" fill="#3b82f6" fill-opacity="0.5"/>
</svg>

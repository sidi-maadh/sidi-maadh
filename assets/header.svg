<svg width="900" height="240" viewBox="0 0 900 240" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="hbg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a0c10"/>
      <stop offset="1" stop-color="#10131a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#8b5cf6"/>
      <stop offset="0.5" stop-color="#6366f1"/>
      <stop offset="1" stop-color="#3b82f6"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.85" cy="0.2" r="0.6">
      <stop offset="0" stop-color="#6366f1" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#6366f1" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M30 0 L0 0 0 30" fill="none" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="900" height="240" rx="16" fill="url(#hbg)"/>
  <rect width="900" height="240" rx="16" fill="url(#grid)"/>
  <rect width="900" height="240" rx="16" fill="url(#glow)"/>
  <rect x="0.5" y="0.5" width="899" height="239" rx="16" fill="none" stroke="#ffffff" stroke-opacity="0.08"/>

  <!-- accent top line -->
  <rect x="0" y="0" width="900" height="3" rx="1.5" fill="url(#accent)"/>

  <!-- Availability pill -->
  <g transform="translate(56, 50)">
    <rect width="200" height="28" rx="14" fill="#8b5cf6" fill-opacity="0.12" stroke="#8b5cf6" stroke-opacity="0.35"/>
    <circle cx="18" cy="14" r="4" fill="#34d399"/>
    <circle cx="18" cy="14" r="4" fill="#34d399" opacity="0.4">
      <animate attributeName="r" values="4;8;4" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.4;0;0.4" dur="2s" repeatCount="indefinite"/>
    </circle>
    <text x="32" y="19" fill="#c4b5fd" font-size="12" font-weight="600" letter-spacing="0.3">Available for AI / ML roles</text>
  </g>

  <!-- Name -->
  <text x="56" y="120" fill="#f0f3f9" font-size="38" font-weight="700" letter-spacing="-0.5">Sidi Chrif Ahmed Maadh</text>

  <!-- Role line -->
  <text x="57" y="152" fill="#8b93a7" font-size="17" font-weight="400">
    <tspan fill="#a78bfa" font-weight="600">AI / Machine Learning Engineer</tspan>
    <tspan fill="#4b5263"> · </tspan>
    <tspan>Master's in Artificial Intelligence</tspan>
  </text>

  <!-- Meta row -->
  <g transform="translate(56, 184)" font-size="13" fill="#6b7280">
    <text x="0" y="12">📍 Mauritania</text>
    <text x="115" y="12" fill="#4b5263">|</text>
    <text x="130" y="12">🎓 MSc Artificial Intelligence</text>
    <text x="330" y="12" fill="#4b5263">|</text>
    <text x="345" y="12">🌐 Remote-friendly</text>
  </g>

  <!-- Right monogram -->
  <g transform="translate(744, 70)">
    <rect width="100" height="100" rx="22" fill="#16191f" stroke="#8b5cf6" stroke-opacity="0.3" stroke-width="1.5"/>
    <rect x="14" y="14" width="72" height="72" rx="14" fill="url(#accent)" fill-opacity="0.12"/>
    <text x="50" y="64" text-anchor="middle" fill="url(#accent)" font-size="40" font-weight="700">SM</text>
  </g>
</svg>

<svg width="900" height="430" viewBox="0 0 900 430" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="ebg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a0c10"/>
      <stop offset="1" stop-color="#10131a"/>
    </linearGradient>
    <linearGradient id="eacc" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#8b5cf6"/>
      <stop offset="1" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="barg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#8b5cf6"/>
      <stop offset="1" stop-color="#6366f1"/>
    </linearGradient>
  </defs>

  <rect width="900" height="430" rx="16" fill="url(#ebg)"/>
  <rect x="0.5" y="0.5" width="899" height="429" rx="16" fill="none" stroke="#ffffff" stroke-opacity="0.08"/>

  <!-- Section label -->
  <g transform="translate(40, 40)">
    <rect x="0" y="-14" width="4" height="20" rx="2" fill="url(#eacc)"/>
    <text x="16" y="2" fill="#f0f3f9" font-size="16" font-weight="700">Self Education</text>
    <text x="166" y="2" fill="#4b5263" font-size="13">// lifelong learning tracker</text>
  </g>
  <text x="56" y="62" fill="#8b93a7" font-size="13">Daily hours logged across scientific &amp; practical fields — public accountability dashboard.</text>

  <!-- Metric cards -->
  <g transform="translate(40, 78)">
    <rect width="194" height="62" rx="12" fill="#13161c" stroke="#222831"/>
    <text x="16" y="22" fill="#6b7280" font-size="10" font-weight="600" letter-spacing="0.8">TOTAL STUDIED</text>
    <text x="16" y="46" fill="#f0f3f9" font-size="22" font-weight="700">250<tspan font-size="13" fill="#8b93a7" font-weight="500">h 23m</tspan></text>
  </g>
  <g transform="translate(246, 78)">
    <rect width="194" height="62" rx="12" fill="#13161c" stroke="#222831"/>
    <text x="16" y="22" fill="#6b7280" font-size="10" font-weight="600" letter-spacing="0.8">YEARLY GOAL</text>
    <text x="16" y="46" fill="#f0f3f9" font-size="22" font-weight="700">1200<tspan font-size="13" fill="#8b93a7" font-weight="500">h · 21%</tspan></text>
  </g>
  <g transform="translate(452, 78)">
    <rect width="194" height="62" rx="12" fill="#13161c" stroke="#222831"/>
    <text x="16" y="22" fill="#6b7280" font-size="10" font-weight="600" letter-spacing="0.8">TOP SUBJECT</text>
    <text x="16" y="44" fill="#f0f3f9" font-size="14" font-weight="700">Computer Science</text>
    <text x="170" y="44" fill="#a78bfa" font-size="11" text-anchor="end">133h</text>
  </g>
  <g transform="translate(658, 78)">
    <rect width="202" height="62" rx="12" fill="#13161c" stroke="#222831"/>
    <text x="16" y="22" fill="#6b7280" font-size="10" font-weight="600" letter-spacing="0.8">FIELDS TRACKED</text>
    <text x="16" y="46" fill="#f0f3f9" font-size="22" font-weight="700">14<tspan font-size="13" fill="#8b93a7" font-weight="500"> areas · 9 active</tspan></text>
  </g>

  <!-- Bars title -->
  <text x="40" y="172" fill="#6b7280" font-size="11" font-weight="600" letter-spacing="1">HOURS BY FIELD</text>
  <line x1="158" y1="168" x2="860" y2="168" stroke="#ffffff" stroke-opacity="0.06"/>

  <!-- Bar 1 -->
  <text x="40" y="194" fill="#cfd6e4" font-size="13" font-weight="500">Computer Science · Technology · Programming</text>
  <text x="860" y="194" fill="#e6eaf2" font-size="12" font-weight="600" text-anchor="end">133h 30m</text>
  <rect x="40" y="200" width="820" height="8" rx="4" fill="#161a21"/>
  <rect x="40" y="200" width="820" height="8" rx="4" fill="url(#barg)"/>

  <!-- Bar 2 -->
  <text x="40" y="228" fill="#cfd6e4" font-size="13" font-weight="500">Innovation · Design Thinking · Ideation</text>
  <text x="860" y="228" fill="#e6eaf2" font-size="12" font-weight="600" text-anchor="end">30h 40m</text>
  <rect x="40" y="234" width="820" height="8" rx="4" fill="#161a21"/>
  <rect x="40" y="234" width="189" height="8" rx="4" fill="url(#barg)"/>

  <!-- Bar 3 -->
  <text x="40" y="262" fill="#cfd6e4" font-size="13" font-weight="500">Economics · Marketing · Finance</text>
  <text x="860" y="262" fill="#e6eaf2" font-size="12" font-weight="600" text-anchor="end">23h 40m</text>
  <rect x="40" y="268" width="820" height="8" rx="4" fill="#161a21"/>
  <rect x="40" y="268" width="145" height="8" rx="4" fill="url(#barg)"/>

  <!-- Bar 4 -->
  <text x="40" y="296" fill="#cfd6e4" font-size="13" font-weight="500">Statistics · Mathematics · Data Analysis</text>
  <text x="860" y="296" fill="#e6eaf2" font-size="12" font-weight="600" text-anchor="end">21h 30m</text>
  <rect x="40" y="302" width="820" height="8" rx="4" fill="#161a21"/>
  <rect x="40" y="302" width="132" height="8" rx="4" fill="url(#barg)"/>

  <!-- Bar 5 -->
  <text x="40" y="330" fill="#cfd6e4" font-size="13" font-weight="500">Languages (Arabic · English · French)</text>
  <text x="860" y="330" fill="#e6eaf2" font-size="12" font-weight="600" text-anchor="end">21h 02m</text>
  <rect x="40" y="336" width="820" height="8" rx="4" fill="#161a21"/>
  <rect x="40" y="336" width="129" height="8" rx="4" fill="url(#barg)"/>

  <!-- Progress rings -->
  <line x1="40" y1="364" x2="860" y2="364" stroke="#ffffff" stroke-opacity="0.07"/>

  <!-- Year progress ring -->
  <g transform="translate(40, 378)">
    <circle cx="26" cy="26" r="22" fill="none" stroke="#161a21" stroke-width="6"/>
    <circle cx="26" cy="26" r="22" fill="none" stroke="#8b5cf6" stroke-width="6" stroke-linecap="round" stroke-dasharray="138" stroke-dashoffset="84" transform="rotate(-90 26 26)"/>
    <text x="26" y="31" text-anchor="middle" fill="#f0f3f9" font-size="13" font-weight="700">39%</text>
    <text x="62" y="22" fill="#e6eaf2" font-size="13" font-weight="600">Year Progress</text>
    <text x="62" y="40" fill="#8b93a7" font-size="11.5">144 days passed · 221 remaining</text>
  </g>

  <!-- Life progress ring -->
  <g transform="translate(470, 378)">
    <circle cx="26" cy="26" r="22" fill="none" stroke="#161a21" stroke-width="6"/>
    <circle cx="26" cy="26" r="22" fill="none" stroke="#3b82f6" stroke-width="6" stroke-linecap="round" stroke-dasharray="138" stroke-dashoffset="86" transform="rotate(-90 26 26)"/>
    <text x="26" y="31" text-anchor="middle" fill="#f0f3f9" font-size="13" font-weight="700">38%</text>
    <text x="62" y="22" fill="#e6eaf2" font-size="13" font-weight="600">Life Progress</text>
    <text x="62" y="40" fill="#8b93a7" font-size="11.5">24 years · 292 months — keep building</text>
  </g>
</svg>

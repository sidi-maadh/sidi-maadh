<svg width="860" height="220" viewBox="0 0 860 220" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6e40c9;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#a371f7;stop-opacity:0.1"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="860" height="220" rx="12" fill="url(#bg)" stroke="#30363d" stroke-width="1"/>

  <!-- Title bar -->
  <rect x="0" y="0" width="860" height="48" rx="12" fill="#161b22"/>
  <rect x="0" y="36" width="860" height="12" fill="#161b22"/>
  <circle cx="22" cy="24" r="6" fill="#ff5f57"/>
  <circle cx="42" cy="24" r="6" fill="#febc2e"/>
  <circle cx="62" cy="24" r="6" fill="#28c840"/>
  <text x="430" y="29" text-anchor="middle" fill="#e6edf3" font-family="JetBrains Mono,monospace" font-size="13" font-weight="600">🎯 AI Research Focus</text>

  <!-- Column headers background -->
  <rect x="20" y="62" width="260" height="36" rx="8" fill="url(#headerGrad)" stroke="#6e40c9" stroke-width="1"/>
  <rect x="300" y="62" width="260" height="36" rx="8" fill="url(#headerGrad)" stroke="#6e40c9" stroke-width="1"/>
  <rect x="580" y="62" width="260" height="36" rx="8" fill="url(#headerGrad)" stroke="#6e40c9" stroke-width="1"/>

  <!-- Column headers text -->
  <text x="150" y="85" text-anchor="middle" fill="#a371f7" font-family="Segoe UI,sans-serif" font-size="13" font-weight="600">🤖  Machine Learning</text>
  <text x="430" y="85" text-anchor="middle" fill="#a371f7" font-family="Segoe UI,sans-serif" font-size="13" font-weight="600">🧬  Deep Learning</text>
  <text x="710" y="85" text-anchor="middle" fill="#a371f7" font-family="Segoe UI,sans-serif" font-size="13" font-weight="600">💬  NLP</text>

  <!-- Row 1 -->
  <rect x="20" y="108" width="260" height="30" rx="6" fill="#1c2128"/>
  <rect x="300" y="108" width="260" height="30" rx="6" fill="#1c2128"/>
  <rect x="580" y="108" width="260" height="30" rx="6" fill="#1c2128"/>
  <text x="150" y="128" text-anchor="middle" fill="#c9d1d9" font-family="Segoe UI,sans-serif" font-size="12">Supervised &amp; Unsupervised</text>
  <text x="430" y="128" text-anchor="middle" fill="#c9d1d9" font-family="Segoe UI,sans-serif" font-size="12">CNN · RNN · Transformers</text>
  <text x="710" y="128" text-anchor="middle" fill="#c9d1d9" font-family="Segoe UI,sans-serif" font-size="12">Text Classification · RAG</text>

  <!-- Row 2 -->
  <rect x="20" y="148" width="260" height="30" rx="6" fill="#161b22"/>
  <rect x="300" y="148" width="260" height="30" rx="6" fill="#161b22"/>
  <rect x="580" y="148" width="260" height="30" rx="6" fill="#161b22"/>
  <text x="150" y="168" text-anchor="middle" fill="#c9d1d9" font-family="Segoe UI,sans-serif" font-size="12">Feature Engineering</text>
  <text x="430" y="168" text-anchor="middle" fill="#c9d1d9" font-family="Segoe UI,sans-serif" font-size="12">PyTorch · TensorFlow</text>
  <text x="710" y="168" text-anchor="middle" fill="#c9d1d9" font-family="Segoe UI,sans-serif" font-size="12">LLMs · Fine-tuning</text>

  <!-- Row 3 -->
  <rect x="20" y="188" width="260" height="24" rx="6" fill="#1c2128"/>
  <rect x="300" y="188" width="260" height="24" rx="6" fill="#1c2128"/>
  <rect x="580" y="188" width="260" height="24" rx="6" fill="#1c2128"/>
  <text x="150" y="205" text-anchor="middle" fill="#c9d1d9" font-family="Segoe UI,sans-serif" font-size="12">Model Evaluation &amp; Tuning</text>
  <text x="430" y="205" text-anchor="middle" fill="#c9d1d9" font-family="Segoe UI,sans-serif" font-size="12">Computer Vision</text>
  <text x="710" y="205" text-anchor="middle" fill="#c9d1d9" font-family="Segoe UI,sans-serif" font-size="12">Sentiment Analysis</text>

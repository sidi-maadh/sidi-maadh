name: Update Profile Stats

on:
  schedule:
    - cron: '0 6 * * *'      # tous les jours à 06:00 UTC
  workflow_dispatch:          # bouton manuel dans l'onglet Actions

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Generate education SVG
        env:
          SHEET_CSV_URL: ${{ secrets.SHEET_CSV_URL }}
        run: python update_education.py

      - name: Generate community SVG
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python update_community.py

      - name: Commit changes
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/education.svg assets/community.svg
          if git diff --staged --quiet; then
            echo "Aucun changement."
          else
            git commit -m "chore: update profile stats [skip ci]"
            git push
          fi

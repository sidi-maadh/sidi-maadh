name: Update Profile Stats

on:
  schedule:
    - cron: '0 6 * * *'       # tous les jours à 06:00 UTC
    - cron: '0 18 * * *'      # et à 18:00 UTC 
  workflow_dispatch:          # bouton manuel

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Profile cards (header, about, tech stack)
        run: python update_profile.py
        continue-on-error: true

      - name: Education stats (Google Sheet)
        env:
          SHEET_CSV_URL: ${{ secrets.SHEET_CSV_URL }}
        run: python update_education.py

      - name: Community stats (GitHub API)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python update_community.py

      - name: Latest projects (GitHub API)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python update_projects.py

      - name: Codeforces rating
        run: python update_codeforces.py
        continue-on-error: true

      - name: LeetCode stats
        run: python update_leetcode.py
        continue-on-error: true

      - name: CodeChef stats
        run: python update_codechef.py
        continue-on-error: true

      - name: HackerRank stats
        run: python update_hackerrank.py
        continue-on-error: true

      - name: Latest YouTube video
        run: python update_youtube.py
        continue-on-error: true

      - name: Commit changes
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A assets/ README.md
          if git diff --staged --quiet; then
            echo "Aucun changement."
          else
            git commit -m "chore: update profile stats [skip ci]"
            git push
          fi
